<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Resume Analyzer</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css" rel="stylesheet">
  <style>
    /* General Page Styles */
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #fff1f1;
      margin: 0;
      padding: 0;
    }

    /* Container Styling */
    .container {
      max-width: 1300px;
      margin: 40px auto;
      background-color: #ffffff;
      padding: 30px;
      border-radius: 40px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.2); /* <-- fixed box-shadow */
    }

    /* Headings */
    h1, h3 {
      text-align: center;
      color: #000000;
      margin-top: 10px;
      margin-bottom: 25px;
    }

    /* Labels */
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      color: #444;
    }

    /* Form Inputs */
    input[type="file"],
    textarea {
      width: 100%;
      padding: 10px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 20px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px 0;
      background-color: #007bff;
      color: #ffffff;
      font-weight: bold;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    button.analyzing {
      background-color: #ffc107 !important;
      color: #000 !important;
    }

    button.analyzed {
      background-color: #28a745 !important;
      color: #fff !important;
    }

    /* Results Section */
    .results {
      margin-top: 30px;
      background-color: #f9f9f9;
      padding: 25px;
      border-radius: 10px;
      border: 1px solid #e0e0e0;
    }

    /* Feedback Section */
    .feedback-section {
      margin-top: 20px;
    }

    .feedback-section details {
      margin-bottom: 15px;
      padding: 10px;
      background-color: #fff;
      border: 1px solid #ccc;
      border-left: 5px solid #007bff;
      border-radius: 6px;
    }

    .feedback-section summary {
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      color: #007bff;
    }

    .feedback-section ul {
      margin-top: 10px;
      padding-left: 20px;
    }

    .feedback-section li {
      margin-bottom: 8px;
    }

    .feedback-section strong {
      color: #135ca9;
    }

    /* Chart */
    canvas {
      margin-top: 30px;
      max-width: 100%;
    }

    /* Back to Home Button */
    .back-to-home-btn {
      position: absolute;
      top: 65px;
      right: 90px;
      background-color: #007bff;
      color: hsl(0, 0%, 100%);
      padding: 5px 15px;
      font-size: 1.1rem;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease-in-out;
    }

    .back-to-home-btn:hover {
      background-color: #135ca9;
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .back-to-home-btn:focus {
      outline: none;
      box-shadow: 0 0 0 4px rgba(26, 137, 69, 0.5);
    }

    /* Challenge Section Styling */
    #challengeSection {
      display: none;
      margin-top: 40px;
      padding: 20px;
      border-radius: 10px;
      background: #f9f9f9;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    #challengeSection h2 {
      margin-bottom: 10px;
    }

    #timer {
      font-size: 1.2em;
      font-weight: bold;
      color: #e53935;
      margin-bottom: 10px;
    }

    .code-area {
      width: 100%;
      height: 200px;
      font-family: monospace;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #ccc;
      background-color: #fff;
    }

    #codeResult {
      margin-top: 20px;
      background-color: #eef5ff;
      padding: 15px;
      border-radius: 8px;
    }

    .CodeMirror {
      height: 400px;
      border: 1px solid #ddd;
    }

    #output {
      min-height: 100px;
      border: 1px solid #ddd;
      padding: 10px;
      margin-top: 10px;
    }

    .score-display {
      font-size: 24px;
      font-weight: bold;
      margin: 20px 0;
    }

    .feedback {
      margin: 15px 0;
      padding: 10px;
      border-left: 4px solid #007bff;
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>
<div class="container">
  <a href="{{ url_for('index') }}"id="backToHomeBtn" class="back-to-home-btn">Back to Home</a>
  <h1>AI Resume Analyzer</h1>
  <
  <!-- Resume Upload Section -->
  <div class="section">
    <label>Upload Resume (PDF):</label>
    <input type="file" id="resume" accept=".pdf" />
  </div>

  <div class="section">
    <label>Job Description (Optional):</label>
    <textarea id="jobDescription" placeholder="Paste job description here (optional)..."></textarea>
  </div>

  <button id="analyzeBtn" onclick="analyzeResume()">Analyze Resume</button>

  <!-- Results + Continue Button -->
  <div class="results" id="result" style="display: none;">
    <h3>Analysis Result</h3>
    <p><strong>Name:</strong> <span id="name"></span></p>
    <p><strong>ATS Score:</strong> <span id="ats"></span>%</p>
    <div class="feedback-section" id="feedbackFormatted"></div>
    <canvas id="scoreChart"></canvas>

    <!-- Continue to Challenge Button -->
    <div style="margin-top: 20px;">
      <button onclick="startChallenge()" style="background-color:#1976d2; color:white; padding: 10px 20px; font-size: 16px; border:none; border-radius:6px;">Continue to Coding Challenge</button>
    </div>
  </div>

  <!-- Coding Challenge Section -->
  <div id="challengeSection">
    <h2>Live Coding Challenge</h2>
    <div id="timer">Time Left: 20:00</div>
    <div id="codingChallenge"><strong>Loading challenge...</strong></div>

    <div class="row">
      <div class="col-md-8">
        <div class="mb-3">
          <label for="language" class="form-label">Select Language:</label>
          <select class="form-select" id="language">
            <option value="Python">Python</option>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
            <option value="C++">C++</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Question:</label>
          <div id="question" class="p-3 bg-light"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Your Code:</label>
          <textarea id="code"></textarea>
        </div>
        <button class="btn btn-primary" onclick="submitCode()">Submit</button>
        
      </div>
      <div class="col-md-4">
        <div class="score-display" id="score"></div>
        <div class="feedback" id="feedback"></div>
        <div id="output"></div>
      </div>
    </div>
  </div>
</div>

<script>
  let chartInstance = null;
  let timerInterval;
  let editor;
  let currentQuestion = "";

  async function analyzeResume() {
    const resumeInput = document.getElementById("resume");
    const jobDescription = document.getElementById("jobDescription").value.trim();
    const button = document.getElementById("analyzeBtn");

    if (!resumeInput.files.length) {
      alert("Please upload a resume.");
      return;
    }

    button.textContent = "Analyzing Resume...";
    button.classList.add("analyzing");
    button.disabled = true;

    const formData = new FormData();
    formData.append("resume", resumeInput.files[0]);
    formData.append("jobDescription", jobDescription);

    try {
      const response = await fetch("/analyze", {
        method: "POST",
        body: formData
      });

      const result = await response.json();
      if (!response.ok || result.error || !result.data) {
        throw new Error(result.error || "Invalid server response.");
      }

      displayAnalysisResult(result.data, result.before, result.after);
      button.textContent = "Resume Analyzed ✔";
      button.classList.remove("analyzing");
      button.classList.add("analyzed");

    } catch (error) {
      alert(`Error analyzing resume:\n\n${error.message}`);
      document.getElementById("result").style.display = "none";
      button.textContent = "Analyze Resume";
      button.classList.remove("analyzing");
    } finally {
      button.disabled = false;
    }
  }

  function displayAnalysisResult(data, before, after) {
    document.getElementById("result").style.display = "block";
    document.getElementById("name").textContent = data.name || "Unknown";
    document.getElementById("ats").textContent = data.ats_score ?? 0;
    document.getElementById("feedbackFormatted").innerHTML = formatFeedback(data.feedback || "No feedback available.");

    const ctx = document.getElementById("scoreChart").getContext("2d");
    if (chartInstance) chartInstance.destroy();

    if (before && after) {
      chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels: Object.keys(before),
          datasets: [
            { label: "Before", data: Object.values(before), backgroundColor: "rgba(255, 99, 132, 0.6)" },
            { label: "After", data: Object.values(after), backgroundColor: "rgba(54, 162, 235, 0.6)" }
          ]
        }
      });
    } else {
      ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    }
  }

  function formatFeedback(raw) {
    const sections = raw.split(/##\s*/g).filter(Boolean);
    return sections.map(section => {
      const [title, ...body] = section.split("\n");
      const content = body.join("\n").trim().replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\n/g, "<br>");
      return `<details open><summary><strong>${title}</strong></summary><p>${content}</p></details>`;
    }).join("");
  }

  function startChallenge() {
    document.getElementById("result").style.display = "none";
    document.getElementById("challengeSection").style.display = "block";
    loadChallenge();
    startTimer(20 * 60);
  }

  async function loadChallenge() {
    try {
      const response = await fetch('/get_challenge');
      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error);
      }
      
      currentQuestion = data.question;
      document.getElementById("codingChallenge").innerHTML = `
        <div class="mb-3">
          <strong>Problem:</strong><br>
          ${data.question}
        </div>
        <div class="mb-3">
          <strong>Available Languages:</strong><br>
          ${data.languages.join(', ')}
        </div>
      `;
      
      // Update language dropdown to only show available languages
      const languageSelect = document.getElementById("language");
      languageSelect.innerHTML = data.languages
        .map(lang => `<option value="${lang}">${lang}</option>`)
        .join('');
        
      // Clear previous code and results
      editor.setValue("");
      document.getElementById("score").textContent = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("output").textContent = "";
      
    } catch (error) {
      console.error('Error loading challenge:', error);
      document.getElementById("codingChallenge").innerHTML = `
        <div class="alert alert-danger">
          Failed to load challenge: ${error.message || 'Unknown error'}
          <br><button class="btn btn-sm btn-outline-danger mt-2" onclick="loadChallenge()">Try Again</button>
        </div>
      `;
    }
  }

  function startTimer(duration) {
    clearInterval(timerInterval);
    let timer = duration;
    updateTimerDisplay(timer);

    timerInterval = setInterval(() => {
      if (--timer < 0) {
        clearInterval(timerInterval);
        alert("Time's up! Submit your code if not already done.");
      } else {
        updateTimerDisplay(timer);
      }
    }, 1000);
  }

  function updateTimerDisplay(sec) {
    const min = String(Math.floor(sec / 60)).padStart(2, "0");
    const s = String(sec % 60).padStart(2, "0");
    document.getElementById("timer").textContent = `Time Left: ${min}:${s}`;
  }

  async function submitCode() {
    const code = editor.getValue();
    const language = document.getElementById("language").value;
    
    if (!code.trim()) {
      alert("Please write some code before submitting.");
      return;
    }

    const scoreElement = document.getElementById("score");
    const feedbackElement = document.getElementById("feedback");
    const outputElement = document.getElementById("output");

    try {
      scoreElement.textContent = "Evaluating...";
      feedbackElement.textContent = "";
      outputElement.textContent = "";

      const response = await fetch('/evaluate_code', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          code: code,
          language: language,
          question: currentQuestion
        })
      });

      const result = await response.json();
      if (result.error) {
        throw new Error(result.error);
      }

      // Use the score from the backend response
      const score = result.score || result.combined_score || 0;
      scoreElement.textContent = `Score: ${score}%`;
      scoreElement.style.color = score >= 70 ? 'green' : 'red';

      // Display feedback/tips
      if (result.tips) {
        feedbackElement.innerHTML = `<div class="alert alert-info">
          <strong>Feedback:</strong><br>${result.tips}
        </div>`;
      }
      
      // Display matched question if available
      if (result.matched_question) {
        outputElement.innerHTML = `<div class="alert alert-secondary">
          <strong>Matched Problem:</strong><br>${result.matched_question}
        </div>`;
      }

    } catch (error) {
      console.error('Error:', error);
      scoreElement.textContent = 'Score: N/A';
      scoreElement.style.color = 'red';
      feedbackElement.innerHTML = `<div class="alert alert-danger">
        Error evaluating code: ${error.message}
      </div>`;
    }
  }

  async function getNewQuestion() {
    try {
      const response = await fetch('/get_challenge');
      const data = await response.json();
      
      if (data.error) {
        throw new Error(data.error);
      }
      
      currentQuestion = data.question;
      document.getElementById("question").innerHTML = `
        <div class="mb-3">
          <strong>Problem:</strong><br>
          ${data.question}
        </div>
      `;
      
      // Update language dropdown to only show available languages
      const languageSelect = document.getElementById("language");
      languageSelect.innerHTML = data.languages
        .map(lang => `<option value="${lang}">${lang}</option>`)
        .join('');
      
      // Clear previous code and results
      editor.setValue("");
      document.getElementById("score").textContent = "";
      document.getElementById("feedback").textContent = "";
      document.getElementById("output").textContent = "";
      
      // Reset timer
      startTimer(20 * 60);
      
    } catch (error) {
      console.error('Error:', error);
      document.getElementById("question").innerHTML = `
        <div class="alert alert-danger">
          Failed to load question: ${error.message || 'Unknown error'}
          <br><button class="btn btn-sm btn-outline-danger mt-2" onclick="getNewQuestion()">Try Again</button>
        </div>
      `;
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      lineNumbers: true,
      mode: "python",
      theme: "monokai",
      indentUnit: 4,
      indentWithTabs: false,
      autoCloseBrackets: true,
      matchBrackets: true
    });

    // Update editor mode when language changes
    document.getElementById("language").addEventListener("change", function(e) {
      const modes = {
        "Python": "python",
        "JavaScript": "javascript",
        "Java": "text/x-java",
        "C++": "text/x-c++src"
      };
      editor.setOption("mode", modes[e.target.value]);
    });

    // Load initial question
    getNewQuestion();
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/clike/clike.min.js"></script>

</body>
</html>
